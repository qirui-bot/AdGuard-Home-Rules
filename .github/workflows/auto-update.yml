name: Rules Update

on:
  schedule:
    - cron: '0 */2 * * *'  # 每 2 小时运行一次
  workflow_dispatch:

jobs:
  update-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Verify scripts exist
        run: |
          missing=()
          for script in fetch_upstream.py merge_rules.py whitelist_processor.py combine_final.py; do
            [ -f "scripts/$script" ] || missing+=("$script")
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "❌ Missing scripts: ${missing[*]}"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests tldextract

      - name: Create necessary directories
        run: mkdir -p sources filters scripts Release

      - name: Run rules pipeline
        run: |
          python scripts/fetch_upstream.py
          python scripts/merge_rules.py
          python scripts/whitelist_processor.py
          python scripts/combine_final.py

      - name: Validate rules
        run: |
          FILE="Release/combined-rules.txt"
          if [ -s "$FILE" ]; then
            echo "✅ Rules generated successfully"
            echo "Line count: $(wc -l < "$FILE")"
          else
            echo "❌ Combined rules file is empty or missing!"
            exit 1
          fi

      # ================= 新增部分：更新 README 信息 =================
      - name: Update README Info
        run: |
          # 1. 统计规则总数 (排除空行)
          RULE_COUNT=$(grep -c -v '^[[:space:]]*$' "Release/combined-rules.txt")
          # 2. 获取当前北京时间
          UPDATE_TIME=$(TZ=Asia/Shanghai date "+%Y-%m-%d %H:%M:%S")
          
          # 3. 过滤掉 README 中旧的更新信息行，保留原内容
          grep -v '^> 🕒' README.md | grep -v '^> 📊' > tmp.md
          
          # 4. 将新信息插入到 README 最开头，并拼接原内容
          {
            echo "> 🕒 **最后更新**: ${UPDATE_TIME}"
            echo "> 📊 **规则总数**: ${RULE_COUNT} 条"
            echo ""
            cat tmp.md
          } > README.md
          
          # 5. 清理临时文件
          rm tmp.md
      # ============================================================

      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          if ! git diff --quiet || ! git diff --staged --quiet; then
            # 注意：这里增加了 README.md，确保修改被提交
            git add Release/ README.md
            git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "No changes to commit"
          fi
